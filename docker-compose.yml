# TradingCat V1 — local development & production compose
# Usage:
#   docker compose up              # app only (JSON persistence)
#   docker compose --profile db up # app + PostgreSQL

services:
  app:
    build: .
    container_name: tradingcat
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data          # persist local JSON state
      - ./.env:/app/.env:ro       # inject secrets at runtime
    env_file:
      - .env
    environment:
      - TRADINGCAT_DATA_DIR=/app/data
      # When Futu OpenD runs on the host machine:
      - TRADINGCAT_FUTU_HOST=host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
        required: false
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/preflight/startup')"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  postgres:
    image: postgres:16-alpine
    container_name: tradingcat-db
    profiles: ["db"]
    environment:
      POSTGRES_DB: tradingcat
      POSTGRES_USER: tradingcat
      POSTGRES_PASSWORD: ${TRADINGCAT_POSTGRES_PASSWORD:-tradingcat_dev}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tradingcat"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
