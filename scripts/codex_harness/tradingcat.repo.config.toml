# TradingCat inherits the global Codex harness defaults.
# This repo only adds stricter profiles for review and trading-sensitive work.

[profiles.tradingcat_review]
model = "gpt-5.4"
model_reasoning_effort = "high"
approval_policy = "never"
sandbox_mode = "read-only"

[profiles.tradingcat_guarded]
model = "gpt-5.4"
model_reasoning_effort = "high"
approval_policy = "on-request"
sandbox_mode = "workspace-write"

[profiles.tradingcat_guarded.sandbox_workspace_write]
network_access = false
